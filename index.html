<!DOCTYPE html>
<html>
<head>
    <title>Foodie Hub</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body{
            font-family: Arial, sans-serif;
            margin:0;
            background:#f2f2f2;
        }

        header{
            background:#ff4d4d;
            color:white;
            padding:15px;
            text-align:center;
            font-size:22px;
        }

        .container{
            padding:20px;
        }

        h2{
            margin-top:30px;
            border-left:5px solid #ff4d4d;
            padding-left:10px;
        }

        .food-grid{
            display:grid;
            grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
            gap:15px;
        }

        .food-card{
            background:white;
            padding:15px;
            border-radius:10px;
            box-shadow:0 3px 8px rgba(0,0,0,0.1);
            text-align:center;
        }

        .food-card h3{
            margin:5px 0;
        }

        .price{
            color:green;
            font-weight:bold;
        }

        button{
            margin-top:8px;
            padding:8px 12px;
            border:none;
            border-radius:6px;
            background:#ff4d4d;
            color:white;
            cursor:pointer;
        }

        button:hover{
            background:#e60000;
        }

        .cartBtn{
            position:fixed;
            bottom:20px;
            right:20px;
            background:green;
            padding:15px;
            border-radius:50px;
            color:white;
            font-size:18px;
            text-decoration:none;
        }
    </style>
</head>

<body>

<header>
    🍴 Foodie Hub
</header>

<div class="container">

    <!-- PIZZA -->
    <h2>🍕 Pizza</h2>
    <div class="food-grid">
        <div class="food-card">
            <h3>Margherita</h3>
            <p class="price">₹199</p>
            <button onclick="addToCart('Margherita',199)">Add</button>
        </div>

        <div class="food-card">
            <h3>Veg Loaded</h3>
            <p class="price">₹249</p>
            <button onclick="addToCart('Veg Loaded',249)">Add</button>
        </div>

        <div class="food-card">
            <h3>Chicken Pizza</h3>
            <p class="price">₹299</p>
            <button onclick="addToCart('Chicken Pizza',299)">Add</button>
        </div>
    </div>

    <!-- FAST FOOD -->
    <h2>🍔 Fast Food</h2>
    <div class="food-grid">
        <div class="food-card">
            <h3>Burger</h3>
            <p class="price">₹120</p>
            <button onclick="addToCart('Burger',120)">Add</button>
        </div>

        <div class="food-card">
            <h3>French Fries</h3>
            <p class="price">₹90</p>
            <button onclick="addToCart('French Fries',90)">Add</button>
        </div>

        <div class="food-card">
            <h3>Chicken Roll</h3>
            <p class="price">₹150</p>
            <button onclick="addToCart('Chicken Roll',150)">Add</button>
        </div>
    </div>

    <!-- BEVERAGES -->
    <h2>🥤 Beverages</h2>
    <div class="food-grid">
        <div class="food-card">
            <h3>Coca Cola</h3>
            <p class="price">₹40</p>
            <button onclick="addToCart('Coca Cola',40)">Add</button>
        </div>

        <div class="food-card">
            <h3>Cold Coffee</h3>
            <p class="price">₹110</p>
            <button onclick="addToCart('Cold Coffee',110)">Add</button>
        </div>

        <div class="food-card">
            <h3>Fresh Lime Juice</h3>
            <p class="price">₹60</p>
            <button onclick="addToCart('Fresh Lime Juice',60)">Add</button>
        </div>
    </div>

</div>

<a href="cart.html" class="cartBtn">🛒 Cart</a>

<script>
function addToCart(name, price){

    let cart = JSON.parse(localStorage.getItem("cart")) || [];

    let existing = cart.find(item => item.name === name);

    if(existing){
        existing.quantity += 1;
    } else {
        cart.push({
            name: name,
            price: price,
            quantity: 1
        });
    }

    localStorage.setItem("cart", JSON.stringify(cart));
    alert(name + " added to cart!");
}
</script>

</body>
</html>
