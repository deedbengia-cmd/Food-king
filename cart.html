<!DOCTYPE html>
<html>
<head>
    <title>Cart - Foodie Hub</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body{
            font-family: Arial;
            background:#f4f4f4;
            padding:20px;
        }
        h1{
            text-align:center;
        }
        .item{
            background:white;
            padding:15px;
            margin:10px 0;
            border-radius:8px;
        }
        .total{
            font-size:20px;
            font-weight:bold;
            margin-top:20px;
        }
        button{
            padding:10px;
            font-size:16px;
            border:none;
            border-radius:6px;
            cursor:pointer;
            margin-top:10px;
        }
        .orderBtn{
            width:100%;
            background:green;
            color:white;
            font-size:18px;
        }
        .clearBtn{
            width:100%;
            background:red;
            color:white;
        }
        .removeBtn{
            background:orange;
            color:white;
        }
    </style>
</head>

<body>

<h1>Your Cart 🛒</h1>

<div id="cartItems"></div>

<p class="total">Grand Total: ₹<span id="grandTotal">0</span></p>

<button class="orderBtn" onclick="sendWhatsApp()">Place Order on WhatsApp</button>
<button class="clearBtn" onclick="clearCart()">Clear Cart</button>

<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];
let container = document.getElementById("cartItems");
let grandTotal = 0;

function displayCart(){
    container.innerHTML = "";
    grandTotal = 0;

    if(cart.length === 0){
        container.innerHTML = "<p>Your cart is empty</p>";
        document.getElementById("grandTotal").innerText = 0;
        return;
    }

    cart.forEach((item, index) => {
        let itemTotal = item.price * item.quantity;
        grandTotal += itemTotal;

        container.innerHTML += `
            <div class="item">
                <h3>${item.name}</h3>
                <p>Price: ₹${item.price}</p>
                <p>Quantity: ${item.quantity}</p>
                <p>Total: ₹${itemTotal}</p>
                <button class="removeBtn" onclick="removeItem(${index})">Remove</button>
            </div>
        `;
    });

    document.getElementById("grandTotal").innerText = grandTotal;
}

function removeItem(index){
    cart.splice(index,1);
    localStorage.setItem("cart", JSON.stringify(cart));
    displayCart();
}

function clearCart(){
    localStorage.removeItem("cart");
    cart = [];
    displayCart();
}

function sendWhatsApp(){
    if(cart.length === 0){
        alert("Your cart is empty!");
        return;
    }

    let message = "🛒 *Foodie Hub Order* %0A%0A";

    cart.forEach(item => {
        message += item.name + " x " + item.quantity + " = ₹" + (item.price * item.quantity) + "%0A";
    });

    message += "%0A*Grand Total:* ₹" + grandTotal;

    window.open("https://wa.me/919363734907?text=" + message, "_blank");

    clearCart();
    alert("Order Sent Successfully!");
}

displayCart();
</script>

</body>
</html>
