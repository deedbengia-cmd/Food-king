<!DOCTYPE html>
<html>
<head>
    <title>Cart - Foodie Hub</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body{
            font-family: Arial;
            margin:0;
            background:#f4f4f4;
            padding:20px;
        }
        h1{
            text-align:center;
        }
        .item{
            background:white;
            padding:15px;
            margin:10px 0;
            border-radius:8px;
        }
        .total{
            font-size:20px;
            font-weight:bold;
            margin-top:20px;
        }
        button{
            padding:12px;
            width:100%;
            font-size:18px;
            background:green;
            color:white;
            border:none;
            border-radius:8px;
            margin-top:20px;
        }
    </style>
</head>

<body>

<h1>Your Cart 🛒</h1>

<div id="cartItems"></div>

<p class="total">Grand Total: ₹<span id="grandTotal">0</span></p>

<button onclick="sendWhatsApp()">Place Order on WhatsApp</button>

<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];
let container = document.getElementById("cartItems");
let grandTotal = 0;

if(cart.length === 0){
    container.innerHTML = "<p>Your cart is empty</p>";
}else{
    cart.forEach(item => {
        let itemTotal = item.price * item.quantity;
        grandTotal += itemTotal;

        container.innerHTML += `
            <div class="item">
                <h3>${item.name}</h3>
                <p>Price: ₹${item.price}</p>
                <p>Quantity: ${item.quantity}</p>
                <p>Total: ₹${itemTotal}</p>
            </div>
        `;
    });
}

document.getElementById("grandTotal").innerText = grandTotal;

function sendWhatsApp(){
    let message = "🛒 *Foodie Hub Order* %0A%0A";

    cart.forEach(item => {
        message += item.name + " x " + item.quantity + " = ₹" + (item.price * item.quantity) + "%0A";
    });

    message += "%0A*Grand Total:* ₹" + grandTotal;

    window.open("https://wa.me/919363734907?text=" + message, "_blank");
}
</script>

</body>
</html>
