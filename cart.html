<!DOCTYPE html>
<html>
<head>
    <title>Checkout - Foodie Hub</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body{
            font-family: Arial;
            background:#f4f4f4;
            padding:20px;
        }
        h1{
            text-align:center;
        }
        input, textarea{
            width:100%;
            padding:10px;
            margin:8px 0;
            border-radius:6px;
            border:1px solid #ccc;
        }
        .item{
            background:white;
            padding:15px;
            margin:10px 0;
            border-radius:8px;
        }
        .total{
            font-size:20px;
            font-weight:bold;
            margin-top:20px;
        }
        button{
            width:100%;
            padding:12px;
            font-size:18px;
            border:none;
            border-radius:8px;
            margin-top:15px;
            cursor:pointer;
        }
        .orderBtn{
            background:green;
            color:white;
        }
        .clearBtn{
            background:red;
            color:white;
        }
        .qr{
            text-align:center;
            margin-top:20px;
        }
        .qr img{
            width:200px;
        }
    </style>
</head>

<body>

<h1>Checkout 🧾</h1>

<h3>Customer Details</h3>
<input type="text" id="name" placeholder="Your Name" required>
<input type="text" id="phone" placeholder="Phone Number" required>
<textarea id="address" placeholder="Delivery Address" required></textarea>

<h3>Order Summary</h3>
<div id="cartItems"></div>

<p class="total">Grand Total: ₹<span id="grandTotal">0</span></p>

<div class="qr">
    <h3>Scan & Pay</h3>
    <img src="qr.png" alt="QR Code">
</div>

<button class="orderBtn" onclick="sendWhatsApp()">Place Order</button>
<button class="clearBtn" onclick="clearCart()">Clear Cart</button>

<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];
let container = document.getElementById("cartItems");
let grandTotal = 0;

function displayCart(){
    container.innerHTML = "";
    grandTotal = 0;

    if(cart.length === 0){
        container.innerHTML = "<p>Your cart is empty</p>";
        document.getElementById("grandTotal").innerText = 0;
        return;
    }

    cart.forEach(item => {
        let itemTotal = item.price * item.quantity;
        grandTotal += itemTotal;

        container.innerHTML += `
            <div class="item">
                <h4>${item.name}</h4>
                <p>${item.quantity} x ₹${item.price} = ₹${itemTotal}</p>
            </div>
        `;
    });

    document.getElementById("grandTotal").innerText = grandTotal;
}

function clearCart(){
    localStorage.removeItem("cart");
    cart = [];
    displayCart();
}

function sendWhatsApp(){
    let name = document.getElementById("name").value;
    let phone = document.getElementById("phone").value;
    let address = document.getElementById("address").value;

    if(name=="" || phone=="" || address==""){
        alert("Please fill all customer details!");
        return;
    }

    if(cart.length === 0){
        alert("Cart is empty!");
        return;
    }

    let orderId = "FH" + Math.floor(Math.random()*100000);

    let message = "🧾 *Foodie Hub Order* %0A";
    message += "Order ID: " + orderId + "%0A%0A";
    message += "👤 Name: " + name + "%0A";
    message += "📞 Phone: " + phone + "%0A";
    message += "📍 Address: " + address + "%0A%0A";
    message += "🛒 Items:%0A";

    cart.forEach(item => {
        message += item.name + " x " + item.quantity + " = ₹" + (item.price * item.quantity) + "%0A";
    });

    message += "%0A💰 Grand Total: ₹" + grandTotal;

    window.open("https://wa.me/919363734907?text=" + message, "_blank");

    clearCart();
    alert("Order Sent Successfully!");
}

displayCart();
</script>

</body>
</html>
